<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeeksCase | 接配件挑戰賽</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        /* 針對遊戲頁面的額外局部樣式，稍後我會整合進 style.css */
        #game-canvas-container {
            width: 100%;
            max-width: 800px;
            height: 500px;
            margin: 0 auto;
            position: relative;
            background-color: #f8fafc;
            border: 3px solid #1e3a8a;
            border-radius: 15px;
            overflow: hidden; /* 防止配件掉到框外 */
            cursor: none;    /* 在遊戲區域隱藏滑鼠，用籃子代替 */
        }
        
        .game-info-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            background: #1e3a8a;
            color: white;
            border-radius: 15px 15px 0 0;
            font-weight: bold;
        }

        #game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none; /* 預設隱藏 */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-phone-vibrate text-warning me-2"></i>GeeksCase
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">首頁</a></li>
                    <li class="nav-item"><a class="nav-link" href="category.html">商品分類</a></li>
                    <li class="nav-item"><a class="nav-link active" href="game.html">互動小遊戲</a></li>
                    <li class="nav-item"><a class="nav-link" href="support.html">客服中心</a></li>
                    <li class="nav-item"><a class="nav-link" href="reviews.html">評論區</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="text-center mb-4">
            <h1 class="fw-bold">配件接接樂挑戰賽</h1>
            <p class="text-muted">左右移動購物籃接住掉落的配件！接得越多，獎勵越大！</p>
        </div>

        <div class="game-container shadow-lg">
            <div class="game-info-bar">
                <span>得分: <span id="game-score">0</span></span>
                <span>生命值: <span id="game-lives">❤❤❤</span></span>
            </div>
            
            <div id="game-canvas-container">
                <div id="game-over-overlay">
                    <h2 class="display-4 fw-bold text-warning">遊戲結束!</h2>
                    <p class="lead">最終得分: <span id="final-score">0</span></p>
                    <div id="reward-msg" class="mb-4 text-center px-3"></div>
                    <button class="btn btn-warning btn-lg fw-bold" onclick="resetGame()">重新挑戰</button>
                </div>

                <div id="game-start-overlay" style="position: absolute; width:100%; height:100%; display:flex; justify-content:center; align-items:center; background:rgba(255,255,255,0.8); z-index:10;">
                    <button class="btn btn-primary btn-xl px-5 py-3 fw-bold shadow" onclick="startGame()">開始遊戲</button>
                </div>

                <canvas id="gameCanvas"></canvas>
            </div>
        </div>

        <div class="mt-5 p-4 bg-light rounded-3 border">
            <h5><i class="bi bi-info-circle me-2"></i>遊戲規則：</h5>
            <ul>
                <li>使用 **滑鼠左右滑動** 或 **手指觸控** 來移動購物籃。</li>
                <li>接住手機殼、充電器等配件可獲得 10 分。</li>
                <li>漏掉配件會扣 1 點生命值，生命值歸零則遊戲結束。</li>
                <li>得分突破 150 分可解鎖全館 9 折優惠碼！</li>
            </ul>
        </div>
    </main>

    <footer class="text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-2">&copy; 2026 GeeksCase. 319121林穎辰</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
